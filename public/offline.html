<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Quotes</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #fafafa;
      color: #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
    }
    .container { max-width: 400px; }
    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.5rem;
      background: #0a0a0a;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 28px;
      font-weight: bold;
      line-height: 1;
    }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    p { color: #666; line-height: 1.6; margin-bottom: 1.5rem; }
    .btn {
      display: inline-block;
      padding: 0.625rem 1.5rem;
      background: #0a0a0a;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 500;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    @media (prefers-color-scheme: dark) {
      body { background: #0a0a0a; color: #f0f0f0; }
      p { color: #999; }
      .icon { background: #1a1a1a; }
      .btn { background: #f0f0f0; color: #0a0a0a; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">"</div>
    <h1>You're offline</h1>
    <p>This page hasn't been cached yet. Once you reconnect, visit it and it'll be available offline.</p>
    <a class="btn" href="/">Go to Home</a>
  </div>
</body>
</html>
