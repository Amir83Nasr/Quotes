# ── CI Pipeline ─────────────────────────────────────────────────────────────────
# Runs on PRs, pushes to main, and manual dispatch.
# Three jobs run in parallel (lint, typecheck) → build depends on both passing.
# Uses project Makefile targets instead of duplicating commands.

name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs for the same branch — new commits supersede old runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint: ESLint, Prettier format check, MDX content validation ──────────
  lint:
    name: Lint & Format & Content
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: make lint

      - name: Prettier format check
        run: make format-check

      - name: Validate MDX content
        run: pnpm validate:content

  # ── TypeScript: type-check via tsc --noEmit ──────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type check
        run: make typecheck

  # ── Build: Next.js production build ──────────────────────────────────────
  # Depends on lint + typecheck passing — fail-fast, no wasted build time.
  build:
    name: Build
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: make build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.SITE_URL || 'http://localhost:4000' }}
